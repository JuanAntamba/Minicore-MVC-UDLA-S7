<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minicore - Portal Académico</title>
    <style>
        /* Variables de color para mantener armonía en los tonos verdes */
        :root {
            --verde-oscuro: #1b5e20;
            --verde-principal: #2e7d32;
            --verde-claro: #4caf50;
            --verde-fondo: #e8f5e9;
            --blanco: #ffffff;
            --gris-texto: #555555;
        }

        /* Reseteo básico y fondo con un gradiente muy suave */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--verde-fondo) 0%, #c8e6c9 100%);
            color: var(--gris-texto);
        }

        /* Usamos <article> como nuestra tarjeta principal de presentación */
        article {
            background: var(--blanco);
            padding: 3.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(27, 94, 32, 0.1);
            max-width: 500px;
            text-align: center;
            border-top: 6px solid var(--verde-principal);
            animation: deslizarArriba 0.6s ease-out;
        }

        /* Animación de entrada para que se vea premium */
        @keyframes deslizarArriba {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Etiqueta semántica <small> para el badge tecnológico */
        small.badge {
            display: inline-block;
            background: var(--verde-fondo);
            color: var(--verde-principal);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        h1 {
            color: var(--verde-oscuro);
            font-size: 2.2rem;
            margin: 0 0 1rem 0;
            line-height: 1.2;
        }

        p.descripcion {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* Botón con gradiente verde y efecto de elevación al pasar el mouse */
        a.btn-ingresar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(to right, var(--verde-claro), var(--verde-principal));
            color: var(--blanco);
            padding: 1rem 2.5rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(76, 175, 80, 0.3);
        }

        a.btn-ingresar:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(46, 125, 50, 0.4);
        }

        /* Pie de la tarjeta usando <footer> */
        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eeeeee;
            font-size: 0.85rem;
            color: #888888;
        }

        footer strong {
            color: var(--verde-principal);
        }
    </style>
</head>
<body>

    <main>
        <article>
            <header>
                <small class="badge">Patrón MVC • Django</small>
                <h1>Portal de Calificaciones</h1>
                <p class="descripcion">Sistema inteligente de proyección académica para calcular el puntaje requerido en el Progreso 3.</p>
            </header>

            <section>
                <a href="{% url 'resumen' %}" class="btn-ingresar">
                    Acceder al Sistema
                    <span aria-hidden="true">→</span>
                </a>
            </section>

            <footer>
                <p>Ingeniería de Software • <strong>UDLA</strong></p>
            </footer>
        </article>
    </main>

</body>
</html>
